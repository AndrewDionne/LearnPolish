<!DOCTYPE html>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f9fa;
      padding: 2rem 1rem 6rem;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .tabs {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .tab-button {
      background: #e0e0e0;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      margin: 0.25rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .tab-button.active {
      background: #007bff;
      color: white;
    }

    .search-bar {
      margin-bottom: 1rem;
    }

    input[type="text"] {
      width: 100%;
      max-width: 400px;
      padding: 0.5rem;
      font-size: 1rem;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 0.5rem;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #f1f1f1;
    }

    .floating-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
    }
  </style>
</head>

    <a href="/"

  <div id="saveMessage" 
    style="display:none; position:fixed; bottom:140px; right:20px; 
          background:#28a745; color:white; padding:8px 14px; border-radius:8px;">
    ✅ Saved!
  </div>

  <script>
    // Filtering by mode & search
    function filterTable() {
      const activeMode = document.querySelector(".tab-button.active").dataset.mode;
      const query = document.getElementById("searchInput").value.toLowerCase();

      document.querySelectorAll("#setsTable tbody tr").forEach(row => {
        const setName = row.dataset.name.toLowerCase();
        const modes = row.dataset.modes.split(",");
        const matchesMode = activeMode === "all" || modes.includes(activeMode);
        const matchesQuery = setName.includes(query);
        row.style.display = (matchesMode && matchesQuery) ? "" : "none";
      });
    }

    document.querySelectorAll(".tab-button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        filterTable();
      });
    });

    document.getElementById("searchInput").addEventListener("input", filterTable);

</script>
<script>
document.getElementById("saveChanges").addEventListener("click", function () {
    const btn = this;
    const msg = document.getElementById("saveMessage");

    // Disable button and show spinner
    btn.disabled = true;
    btn.innerHTML = "💾 Saving... <span class='spinner'></span>";

    // Prepare data in { setName: [modes...] } format
    const modesData = {};
    document.querySelectorAll("#setsTable tbody tr").forEach(row => {
        const setName = row.dataset.name;
        const checkedModes = [];
        row.querySelectorAll("input[type=checkbox]").forEach(cb => {
            if (cb.checked) checkedModes.push(cb.dataset.mode);
        });
        modesData[setName] = checkedModes;
    });

    // Send request
    fetch("/update_set_modes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(modesData)
    })
    .then(res => res.json())
    .then(() => {
        // Show floating success message
        msg.style.display = "block";
        btn.textContent = "✅ Saved!";
        setTimeout(() => {
            msg.style.display = "none";
            btn.textContent = "💾 Save Changes";
            btn.disabled = false;
        }, 1500);
    })
    .catch(() => {
        // Error UI
        btn.textContent = "⚠️ Error";
        setTimeout(() => {
            btn.textContent = "💾 Save Changes";
            btn.disabled = false;
        }, 2000);
    });
});

// Spinner CSS
const style = document.createElement("style");
style.textContent = `
.spinner {
    display:inline-block;
    width:14px;
    height:14px;
    border:2px solid #fff;
    border-top-color:transparent;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}
@keyframes spin {
    to { transform: rotate(360deg); }
}`;
document.head.appendChild(style);
</script>
</body>
</html>
