<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pleasantries Flashcards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0; padding: 20px;
      background-color: #f8f9fa;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      box-sizing: border-box;
      overflow-x: hidden;
    }
    h1 {
      font-size: 1.5em;
      margin-bottom: 20px;
      position: relative;
      width: 100%;
      text-align: center;
    }
    .home-btn {
      position: absolute;
      right: 0px;
      top: 0;
      font-size: 1.4em;
      background: none;
      border: none;
      cursor: pointer;
    }
    .card {
      width: 90%;
      max-width: 350px;
      height: 220px;
      perspective: 1000px;
      margin: 20px auto;
      box-sizing: border-box;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
    }
    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 12px;
      padding: 20px;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      word-wrap: break-word;
    }
    .card-front {
      background: #ffffff;
      font-size: 1.1em;
    }
    .card-back {
      background: #e9ecef;
      transform: rotateY(180deg);
      flex-direction: column;
      font-size: 1.1em;
    }
    .card-back button {
      margin-top: auto;
      margin-bottom: 20px;
      padding: 8px 16px;
      font-size: 1em;
      background-color: #28a745;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
    .nav-buttons {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }
    .nav-button {
      padding: 6px 12px;
      font-size: 1em;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      width: 100px;
      height: 30px;
      cursor: pointer;
    }
    .nav-button:disabled {
      background-color: #aaa;
      cursor: default;
    }
  </style>
</head>
<body>
 <h1>Pleasantries Flashcards <button class="home-btn" onclick="goHome()">🏠</button></h1>

  <div class="card" id="cardContainer">
    <div class="card-inner" id="cardInner">
      <div class="card-front" id="cardFront"></div>
      <div class="card-back" id="cardBack"></div>
    </div>
  </div>

  <div class="nav-buttons">
    <button id="prevBtn" class="nav-button">Previous</button>
    <button id="nextBtn" class="nav-button">Next</button>
  </div>

  <audio id="audioPlayer">
    <source id="audioSource" src="" type="audio/mpeg" />
  </audio>

  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  
  <script>
    
    // JS-side filename sanitizer (to match Python sanitize_filename)
    function sanitizeFilename(text) {
      return text
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")   // remove diacritics
        .replace(/[^a-zA-Z0-9]+/g, "_")      // non-alphanumeric → _
        .replace(/^_+|_+$/g, "");            // trim underscores
    }

    const cards = [{"phrase": "Dzień dobry", "pronunciation": "jen DOH-brih", "meaning": "Good morning / Good day", "audio_file": "0_Dzien_dobry.mp3"}, {"phrase": "Dobry wieczór", "pronunciation": "DOH-brih VYEH-choor", "meaning": "Good evening", "audio_file": "1_Dobry_wieczor.mp3"}, {"phrase": "Cześć", "pronunciation": "cheshch", "meaning": "Hi / Hello", "audio_file": "2_Czesc.mp3"}, {"phrase": "Hej", "pronunciation": "hey", "meaning": "Hey", "audio_file": "3_Hej.mp3"}, {"phrase": "Do widzenia", "pronunciation": "doh veed-ZEN-ya", "meaning": "Goodbye", "audio_file": "4_Do_widzenia.mp3"}, {"phrase": "Na razie", "pronunciation": "nah RAH-zhyeh", "meaning": "See you (soon)", "audio_file": "5_Na_razie.mp3"}, {"phrase": "Pa", "pronunciation": "pah", "meaning": "Bye (informal)", "audio_file": "6_Pa.mp3"}, {"phrase": "Miłego dnia", "pronunciation": "mee-WEH-goh DNIA", "meaning": "Have a nice day", "audio_file": "7_Mi_ego_dnia.mp3"}, {"phrase": "Dziękuję", "pronunciation": "jen-KOO-yeh", "meaning": "Thank you", "audio_file": "8_Dziekuje.mp3"}, {"phrase": "Dzięki", "pronunciation": "JEN-kee", "meaning": "Thanks (informal)", "audio_file": "9_Dzieki.mp3"}, {"phrase": "Proszę", "pronunciation": "PROH-sheh", "meaning": "Please / Here you go", "audio_file": "10_Prosze.mp3"}, {"phrase": "Nie ma za co", "pronunciation": "NYEH mah ZAH tsoh", "meaning": "You’re welcome", "audio_file": "11_Nie_ma_za_co.mp3"}, {"phrase": "Przepraszam", "pronunciation": "psheh-PRAH-shahm", "meaning": "Excuse me / I’m sorry", "audio_file": "12_Przepraszam.mp3"}, {"phrase": "Sorki", "pronunciation": "SOR-kee", "meaning": "Sorry (informal)", "audio_file": "13_Sorki.mp3"}, {"phrase": "Tak", "pronunciation": "tahk", "meaning": "Yes", "audio_file": "14_Tak.mp3"}, {"phrase": "Nie", "pronunciation": "nyeh", "meaning": "No", "audio_file": "15_Nie.mp3"}, {"phrase": "Może", "pronunciation": "MOH-zheh", "meaning": "Maybe", "audio_file": "16_Moze.mp3"}, {"phrase": "Jasne", "pronunciation": "YAS-neh", "meaning": "Sure / Of course", "audio_file": "17_Jasne.mp3"}, {"phrase": "Oczywiście", "pronunciation": "oh-chih-VEE-shcheh", "meaning": "Of course", "audio_file": "18_Oczywiscie.mp3"}, {"phrase": "Mam pytanie", "pronunciation": "mahm pih-TAH-nyeh", "meaning": "I have a question", "audio_file": "19_Mam_pytanie.mp3"}, {"phrase": "Nie rozumiem", "pronunciation": "nyeh roh-ZOO-myem", "meaning": "I don’t understand", "audio_file": "20_Nie_rozumiem.mp3"}, {"phrase": "Mówi pan po angielsku?", "pronunciation": "MOO-vee pahn poh an-GYEL-skoo", "meaning": "Do you (sir) speak English?", "audio_file": "21_Mowi_pan_po_angielsku.mp3"}, {"phrase": "Mówi pani po angielsku?", "pronunciation": "MOO-vee pah-nee poh an-GYEL-skoo", "meaning": "Do you (ma’am) speak English?", "audio_file": "22_Mowi_pani_po_angielsku.mp3"}, {"phrase": "Jak masz na imię?", "pronunciation": "yahk mahsh nah EE-myeh", "meaning": "What’s your name? (informal)", "audio_file": "23_Jak_masz_na_imie.mp3"}, {"phrase": "Jak ma pan/pani na imię?", "pronunciation": "yahk mah pahn/pah-nee nah EE-myeh", "meaning": "What’s your name? (formal)", "audio_file": "24_Jak_ma_pan_pani_na_imie.mp3"}, {"phrase": "Mam na imię…", "pronunciation": "mahm nah EE-myeh…", "meaning": "My name is…", "audio_file": "25_Mam_na_imie.mp3"}];
    const setName = "Pleasantries";
    let currentIndex = 0;

    function updateCard() {
      const entry = cards[currentIndex];
      document.getElementById("cardFront").textContent = entry.meaning;
      document.getElementById("cardBack").innerHTML = `
        <p>${entry.phrase}</p>
        <p><em>${entry.pronunciation}</em></p>
        <button onclick="playAudio('${currentIndex}_' + sanitizeFilename('${entry.phrase}') + '.mp3')">▶️ Play</button>
        <button onclick="assessPronunciation('${entry.phrase}')">🎤 Try</button>
        <div id="pronunciationResult" style="margin-top:10px; font-size:0.9em;"></div>
      `;
      document.getElementById("prevBtn").disabled = currentIndex === 0;
      document.getElementById("nextBtn").disabled = currentIndex === cards.length - 1;
    }

    document.addEventListener("DOMContentLoaded", () => {
        if (!window.SpeechSDK) {
            console.error("❌ Azure Speech SDK failed to load.");
        } else {
            console.log("✅ Azure Speech SDK loaded successfully.");
        }
    });
    function getAudioPath(filename) {
      const repo = window.location.hostname === "andrewdionne.github.io"
        ? window.location.pathname.split("/")[1]
        : "";
      return window.location.hostname === "andrewdionne.github.io"
        ? `/${repo}/static/${setName}/audio/${filename}`
        : `/custom_static/${setName}/audio/${filename}`;
    }

    function playAudio(filename, callback = () => {}) {
    const audio = new Audio(getAudioPath(filename));

    audio.currentTime = 0;
    audio.onended = callback;
    audio.onerror = () => {
      console.warn("⚠️ Audio failed:", filename);
      callback();
    };

    const playPromise = audio.play();
    if (playPromise !== undefined) {
      playPromise.catch(err => {
        console.warn("🔇 iOS blocked:", err);
        callback();
      });
    }
  }

  async function assessPronunciation(referenceText) {
      const resultDiv = document.getElementById("pronunciationResult");
      resultDiv.innerHTML = "⏳ Preparing microphone…";

      if (!window.SpeechSDK) {
          resultDiv.innerHTML = "❌ Azure SDK not loaded.";
          return;
      }

      const baseUrl = window.location.hostname === "andrewdionne.github.io"
          ? "https://flashcards-5c95.onrender.com"
          : "";

      try {
          // 🔑 Fetch token
          const res = await fetch(`${baseUrl}/api/token`);
          const data = await res.json();

          // 🎙️ Configure Azure Speech
          const speechConfig = SpeechSDK.SpeechConfig.fromAuthorizationToken(data.token, data.region);
          speechConfig.speechRecognitionLanguage = "pl-PL";
          speechConfig.setProperty(SpeechSDK.PropertyId.SpeechServiceConnection_InitialSilenceTimeoutMs, "6000");
          speechConfig.setProperty(SpeechSDK.PropertyId.SpeechServiceConnection_EndSilenceTimeoutMs, "1200");

          const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
          const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

          // 📝 Pronunciation assessment config
          const pa = new SpeechSDK.PronunciationAssessmentConfig(
              referenceText,
              SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
              SpeechSDK.PronunciationAssessmentGranularity.Word,
              true
          );
          pa.applyTo(recognizer);

          // Delay UI so mic warms up first
          setTimeout(() => {
              resultDiv.innerHTML = `🎤 Say: <strong>${referenceText}</strong>`;
          }, 1200);

          // ▶️ Recognize once
          recognizer.recognizeOnceAsync(result => {
              if (!result || !result.json) {
                  resultDiv.innerHTML = "⚠️ No speech detected.";
                  recognizer.close();
                  return;
              }

              try {
                  const resJson = JSON.parse(result.json);
                  const words = resJson.NBest && resJson.NBest[0].Words ? resJson.NBest[0].Words : [];

                  const wordHtml = words.map(w => {
                      const score = w.PronunciationAssessment.AccuracyScore;
                      const color = score >= 85 ? "green" : score >= 70 ? "orange" : "red";
                      return `<span style="color:${color}; margin:0 4px;">${w.Word}</span>`;
                  }).join(" ");

                  const avgScore = words.length
                      ? (words.reduce((a, b) => a + b.PronunciationAssessment.AccuracyScore, 0) / words.length).toFixed(1)
                      : "0";

                  resultDiv.innerHTML = `
                      <div><strong>Overall:</strong> ${avgScore}%</div>
                      <div style="margin-top:5px; font-size:1.1em;">${wordHtml}</div>
                  `;
              } catch (err) {
                  console.warn("Parse error:", err);
                  resultDiv.innerHTML = "⚠️ Error parsing result.";
              }
              recognizer.close();
          }, err => {
              console.error("Azure error:", err);
              resultDiv.innerHTML = "❌ Recognition failed.";
              recognizer.close();
          });

      } catch (err) {
          console.error("Azure error:", err);
          resultDiv.innerHTML = "❌ Azure token error.";
          return 0;
      }
  }






    document.getElementById("cardContainer").addEventListener("click", (e) => {
      // Ignore clicks on buttons or result div
      if (e.target.closest("button") || e.target.id === "pronunciationResult") return;
      document.getElementById("cardContainer").classList.toggle("flipped");
    });

    document.getElementById("prevBtn").onclick = () => { if (currentIndex > 0) { currentIndex--; updateCard(); } };
    document.getElementById("nextBtn").onclick = () => { if (currentIndex < cards.length - 1) { currentIndex++; updateCard(); } };

    function goHome() {
      const pathParts = window.location.pathname.split("/");
      const repo = pathParts[1];
      window.location.href = window.location.hostname === "andrewdionne.github.io" ? `/${repo}/` : "/";
    }

    updateCard();

  </script>
</body>
</html>
